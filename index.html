<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SG_threelittlepigs Caption Formatter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2332;
    --navy-light: #243044;
    --navy-mid: #2e3d52;
    --gold: #c9a96e;
    --gold-light: #e8c99a;
    --gold-pale: #f5ead8;
    --cream: #faf8f4;
    --text-primary: #1a2332;
    --text-secondary: #5a6a7e;
    --text-muted: #8a97a8;
    --border: #e2ddd6;
    --border-light: #ede9e3;
    --white: #ffffff;
    --success: #2d7a4e;
    --success-bg: #edf7f2;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* Header */
  .app-header {
    background: var(--navy);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(26,35,50,0.18);
  }
  .app-header .pig-icon { font-size: 22px; line-height: 1; }
  .app-header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--gold-light);
    letter-spacing: 0.01em;
  }
  .app-header-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Layout */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    align-items: start;
  }
  @media (max-width: 680px) {
    .grid { grid-template-columns: 1fr; }
    .preview-panel { order: -1; }
  }

  /* Cards */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-light);
  }

  .section-sep {
    border: none;
    border-top: 1px solid var(--border-light);
    margin: 1.1rem 0;
  }

  /* Fields */
  .field { margin-bottom: 0.85rem; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 5px;
  }
  .field input,
  .field textarea {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field input:focus,
  .field textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,169,110,0.15);
    background: var(--white);
  }
  .field textarea { resize: vertical; min-height: 64px; line-height: 1.5; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Rating slider */
  .rating-ctrl { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .rating-ctrl input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    border: none;
    padding: 0;
  }
  .rating-ctrl input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--navy);
    border: 2px solid var(--gold);
    cursor: pointer;
  }
  .rating-ctrl input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--navy);
    border: 2px solid var(--gold);
    cursor: pointer;
  }
  .rating-val { font-size: 15px; min-width: 68px; }

  /* Dish rating slider (compact) */
  .dish-range { width: 100%; margin-top: 5px; }

  /* Font buttons */
  .sub-label {
    font-size: 11px;
    color: var(--text-muted);
    margin: 8px 0 5px;
    font-weight: 500;
  }
  .font-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .font-btn {
    font-size: 12px;
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    background: var(--white);
    color: var(--text-primary);
    transition: all 0.12s;
    font-family: 'DM Sans', sans-serif;
  }
  .font-btn:hover { border-color: var(--gold); background: var(--gold-pale); }
  .font-btn.active {
    background: var(--navy);
    color: var(--gold-light);
    border-color: var(--navy);
  }

  /* Dish cards */
  .dish-card {
    background: var(--cream);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    margin-bottom: 10px;
    position: relative;
  }
  .dish-num {
    font-size: 10px;
    font-weight: 600;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .remove-btn {
    position: absolute; top: 8px; right: 10px;
    background: none; border: none; cursor: pointer;
    font-size: 15px; color: var(--text-muted); padding: 0; line-height: 1;
    transition: color 0.12s;
  }
  .remove-btn:hover { color: #c0392b; }
  .row3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; }
  @media (max-width: 400px) { .row3 { grid-template-columns: 1fr 1fr; } }
  .dish-field-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; }
  .dish-input {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 8px;
    outline: none;
    transition: border-color 0.15s;
  }
  .dish-input:focus { border-color: var(--gold); }
  .dish-textarea {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 8px;
    outline: none;
    resize: vertical;
    min-height: 50px;
    transition: border-color 0.15s;
  }
  .dish-textarea:focus { border-color: var(--gold); }

  .add-btn {
    width: 100%;
    padding: 8px;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-md);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 0.9rem;
    transition: all 0.15s;
    font-weight: 500;
  }
  .add-btn:hover { border-color: var(--gold); color: var(--navy); background: var(--gold-pale); }

  /* Header badge */
  .double-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 999px;
    background: var(--navy);
    color: var(--gold-light);
    margin-left: 6px;
    vertical-align: middle;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  /* Sign-off grid */
  .signoff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 5px; }
  .signoff-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 6px;
    cursor: pointer;
    text-align: center;
    background: var(--white);
    transition: all 0.15s;
  }
  .signoff-card:hover { border-color: var(--gold); background: var(--gold-pale); }
  .signoff-card.active {
    border-color: var(--navy);
    background: var(--navy);
  }
  .signoff-card.active .sc-name { color: var(--gold-light); }
  .sc-emoji { font-size: 20px; display: block; margin-bottom: 4px; line-height: 1; }
  .sc-name { font-size: 11px; font-weight: 600; color: var(--text-primary); display: block; letter-spacing: 0.01em; }

  /* Preview */
  .preview-panel { position: sticky; top: 76px; }
  @media (max-width: 680px) { .preview-panel { position: static; } }

  .preview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .preview-box {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem;
    min-height: 200px;
    font-size: 14px;
    line-height: 1.9;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-primary);
    margin-bottom: 1rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .char-count {
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    margin-bottom: 8px;
  }
  .char-count.over { color: #c0392b; font-weight: 600; }

  .copy-btn {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: var(--radius-md);
    background: var(--navy);
    color: var(--gold-light);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.03em;
  }
  .copy-btn:hover { background: var(--navy-light); }
  .copy-btn:active { transform: scale(0.98); }
  .copy-btn.copied {
    background: var(--success);
    color: white;
  }

  /* Instagram mockup bar */
  .ig-bar {
    background: var(--navy-mid);
    border-radius: var(--radius-md) var(--radius-md) 0 0;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 0;
  }
  .ig-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--navy);
    flex-shrink: 0;
  }
  .ig-handle { font-size: 12px; font-weight: 600; color: var(--gold-light); }
  .ig-sub { font-size: 10px; color: var(--text-muted); }
  .ig-bar-info { flex: 1; }

  .preview-box {
    border-radius: 0 0 var(--radius-md) var(--radius-md);
    border-top: none;
  }
</style>
</head>

<div class="container">
  <div class="grid">

    <!-- LEFT: Form -->
    <div>
      <!-- Header -->
      <div class="card" style="margin-bottom:1.25rem;">
        <div class="section-label">Header</div>
        <div class="field">
          <label>Location</label>
          <input type="text" id="location" placeholder="e.g. Waffl, Chinese Garden" oninput="render()" />
        </div>
        <div class="field">
          <label>Overall rating</label>
          <div class="rating-ctrl">
            <input type="range" id="overall-rating" min="1" max="5" step="1" value="3" oninput="syncOverall(this.value)" />
            <span class="rating-val" id="overall-val">🐷🐷🐷</span>
          </div>
        </div>
      </div>

      <!-- Dishes -->
      <div class="card" style="margin-bottom:1.25rem;">
        <div class="section-label">Dishes</div>
        <div class="field">
          <label>One-liner that is catchy <span class="double-badge">𝔻𝕠𝕦𝕓𝕝𝕖 font</span></label>
          <input type="text" id="dish-header" placeholder="e.g. Piggies went all out tonight 🐷" value="" oninput="render()" />
        </div>
        <div id="dishes-container"></div>
        <button class="add-btn" onclick="addDish()">+ Add dish</button>
      </div>

      <!-- Footer -->
      <div class="card" style="margin-bottom:1.25rem;">
        <div class="section-label">Footer</div>
        <div class="field">
          <label>General notes</label>
          <textarea id="notes" placeholder="e.g. Staff was super friendly, CDC vouchers accepted..." oninput="render()"></textarea>
        </div>
        <div class="field">
          <label>Sign-off</label>
          <div class="signoff-grid" id="signoff-grid"></div>
        </div>
        <div class="field" style="margin-top:0.85rem;">
          <label>Hashtags</label>
          <input type="text" id="tags" placeholder="#sgfood #foodie #threelittlepigs" oninput="render()" />
        </div>
      </div>

      <!-- Font style -->
      <div class="card">
        <div class="section-label">Font Style</div>
        <div class="sub-label">Dish name, price & rating</div>
        <div class="font-row" id="highlight-fonts"></div>
        <div class="sub-label">Description & notes</div>
        <div class="font-row" id="body-fonts"></div>
      </div>
    </div>

            <div class="ig-handle">sg_threelittlepigs</div>
            <div class="ig-sub">Singapore Food</div>
          </div>
        </div>
        <div class="preview-box" id="preview">Your caption will appear here...</div>
        <div class="char-count" id="char-count">0 characters</div>
        <button class="copy-btn" id="copy-btn" onclick="copyCaption()">Copy caption</button>
      </div>
    </div>

  </div>
</div>

<script>
const EMOJI = '🐷';

const fontOptions = [
  { id: 'plain',      label: 'Plain',         fn: t => t },
  { id: 'bold',       label: '𝗕𝗼𝗹𝗱',         fn: toBold },
  { id: 'script',     label: '𝒮𝒸𝓇𝒾𝓅𝓉',     fn: toScript },
  { id: 'bolditalic', label: '𝘽𝙤𝙡𝙙 𝙄𝙩𝙖𝙡𝙞𝙘', fn: toBoldItalic },
  { id: 'double',     label: '𝔻𝕠𝕦𝕓𝕝𝕖',     fn: toDouble },
];

const signoffs = [
  { id: 'sunny',  emoji: '🌻', name: 'Sunshinepiggy', text: 'With love,\nSunshinepiggy 🌻' },
  { id: 'sleepy', emoji: '✌️', name: 'Sleepypiggy',   text: 'With love,\nSleepypiggy ✌️'  },
  { id: 'tiger',  emoji: '👌', name: 'Tigerpiggy',    text: 'With love,\nTigerpiggy 👌'    },
];

let highlightFont = 'bold';
let bodyFont = 'plain';
let overallRating = 3;
let selectedSignoff = 'sleepy';
let dishes = [{ id: 1, name: '', price: '', rating: 3.5, desc: '' }];
let nextId = 2;

function toBold(s) {
  return [...s].map(c => {
    const n = c.charCodeAt(0);
    if (n>=65&&n<=90) return String.fromCodePoint(n-65+0x1D5D4);
    if (n>=97&&n<=122) return String.fromCodePoint(n-97+0x1D5EE);
    if (n>=48&&n<=57) return String.fromCodePoint(n-48+0x1D7EC);
    return c;
  }).join('');
}
function toBoldItalic(s) {
  return [...s].map(c => {
    const n = c.charCodeAt(0);
    if (n>=65&&n<=90) return String.fromCodePoint(n-65+0x1D63C);
    if (n>=97&&n<=122) return String.fromCodePoint(n-97+0x1D656);
    if (n>=48&&n<=57) return String.fromCodePoint(n-48+0x1D7EC);
    return c;
  }).join('');
}
const SM={A:'𝒜',B:'ℬ',C:'𝒞',D:'𝒟',E:'ℰ',F:'ℱ',G:'𝒢',H:'ℋ',I:'ℐ',J:'𝒥',K:'𝒦',L:'ℒ',M:'ℳ',N:'𝒩',O:'𝒪',P:'𝒫',Q:'𝒬',R:'ℛ',S:'𝒮',T:'𝒯',U:'𝒰',V:'𝒱',W:'𝒲',X:'𝒳',Y:'𝒴',Z:'𝒵',a:'𝒶',b:'𝒷',c:'𝒸',d:'𝒹',e:'ℯ',f:'𝒻',g:'ℊ',h:'𝒽',i:'𝒾',j:'𝒿',k:'𝓀',l:'𝓁',m:'𝓂',n:'𝓃',o:'ℴ',p:'𝓅',q:'𝓆',r:'𝓇',s:'𝓈',t:'𝓉',u:'𝓊',v:'𝓋',w:'𝓌',x:'𝓍',y:'𝓎',z:'𝓏'};
function toScript(s){return [...s].map(c=>SM[c]||c).join('');}
function toDouble(s){
  return [...s].map(c=>{
    const n=c.charCodeAt(0);
    if(n>=65&&n<=90)return String.fromCodePoint(n-65+0x1D538);
    if(n>=97&&n<=122)return String.fromCodePoint(n-97+0x1D552);
    if(n>=48&&n<=57)return String.fromCodePoint(n-48+0x1D7D8);
    return c;
  }).join('');
}
function applyFont(text, fontId) { const f = fontOptions.find(x=>x.id===fontId); return f?f.fn(text):text; }
function pigString(n) { return EMOJI.repeat(Math.min(5, Math.max(1, n))); }

function syncOverall(val) {
  overallRating = parseInt(val);
  document.getElementById('overall-val').textContent = pigString(overallRating);
  render();
}

function addDish() {
  dishes.push({ id: nextId++, name: '', price: '', rating: 3.5, desc: '' });
  renderDishes(); render();
}
function removeDish(id) {
  if (dishes.length === 1) return;
  dishes = dishes.filter(d => d.id !== id);
  renderDishes(); render();
}
function updateDish(id, field, value) {
  const d = dishes.find(x => x.id === id);
  if (d) d[field] = field === 'rating' ? parseFloat(value) : value;
  if (field === 'rating') {
    const lbl = document.getElementById('dlbl-' + id);
    if (lbl) lbl.textContent = parseFloat(value).toFixed(1) + EMOJI;
  }
  render();
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderDishes() {
  const c = document.getElementById('dishes-container');
  c.innerHTML = '';
  dishes.forEach((d, i) => {
    const div = document.createElement('div');
    div.className = 'dish-card';
    div.innerHTML = `
      <div class="dish-num">Dish ${i+1}</div>
      ${dishes.length > 1 ? `<button class="remove-btn" onclick="removeDish(${d.id})">✕</button>` : ''}
      <div class="row3" style="margin-bottom:8px;">
        <div>
          <div class="dish-field-label">Name</div>
          <input class="dish-input" type="text" value="${escHtml(d.name)}" placeholder="e.g. Waffle with Pistachio Gelato" oninput="updateDish(${d.id},'name',this.value)"/>
        </div>
        <div>
          <div class="dish-field-label">Price</div>
          <input class="dish-input" type="text" value="${escHtml(d.price)}" placeholder="$12" oninput="updateDish(${d.id},'price',this.value)"/>
        </div>
        <div>
          <div class="dish-field-label">Rating <span id="dlbl-${d.id}">${d.rating.toFixed(1)}${EMOJI}</span></div>
          <input class="dish-range" type="range" min="0" max="5" step="0.1" value="${d.rating}" oninput="updateDish(${d.id},'rating',this.value)" style="width:100%;margin-top:6px;"/>
        </div>
      </div>
      <div class="dish-field-label">Description</div>
      <textarea class="dish-textarea" placeholder="How did it taste?" oninput="updateDish(${d.id},'desc',this.value)">${escHtml(d.desc)}</textarea>
    `;
    c.appendChild(div);
  });
}

function renderSignoffs() {
  const c = document.getElementById('signoff-grid');
  c.innerHTML = '';
  signoffs.forEach(s => {
    const card = document.createElement('div');
    card.className = 'signoff-card' + (s.id === selectedSignoff ? ' active' : '');
    card.innerHTML = `<span class="sc-emoji">${s.emoji}</span><span class="sc-name">${s.name}</span>`;
    card.onclick = () => { selectedSignoff = s.id; renderSignoffs(); render(); };
    c.appendChild(card);
  });
}

function renderFontButtons(containerId, selectedId, onChange) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  fontOptions.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'font-btn' + (f.id === selectedId ? ' active' : '');
    btn.textContent = f.label;
    btn.onclick = () => { onChange(f.id); renderFontButtons(containerId, f.id, onChange); render(); };
    c.appendChild(btn);
  });
}

function render() {
  const location   = document.getElementById('location').value.trim();
  const dishHeader = document.getElementById('dish-header').value.trim();
  const notes      = document.getElementById('notes').value.trim();
  const tags       = document.getElementById('tags').value.trim();
  const signoffObj = signoffs.find(s => s.id === selectedSignoff);

  let parts = [];
  if (location) parts.push('📍' + applyFont(location, highlightFont));
  parts.push(applyFont('Overall Rating: ', highlightFont) + pigString(overallRating));

  parts.push('');
  if (dishHeader) parts.push(toDouble(dishHeader));

  const activeDishes = dishes.filter(d => d.name || d.desc);
  activeDishes.forEach(d => {
    const namePart   = d.name  ? applyFont(d.name, highlightFont) : '';
    const ratingPart = applyFont(d.rating.toFixed(1) + EMOJI, highlightFont);
    const pricePart  = d.price ? applyFont(d.price, highlightFont) : '';
    const meta = [ratingPart, pricePart].filter(Boolean).join('; ');
    let line = namePart + (meta ? ' (' + meta + ')' : '');
    if (d.desc) line += (line ? ' - ' : '') + applyFont(d.desc, bodyFont);
    if (line) parts.push(line);
  });

  if (notes) { parts.push(''); parts.push(applyFont(notes, bodyFont)); }
  if (signoffObj) { parts.push(''); parts.push(signoffObj.text); }
  if (tags) { parts.push(''); parts.push(tags); }

  const caption = parts.join('\n');
  const preview = document.getElementById('preview');
  const charCount = document.getElementById('char-count');

  preview.textContent = caption || 'Your caption will appear here...';

  const len = caption.length;
  charCount.textContent = len + ' characters' + (len > 2200 ? ' — over Instagram limit!' : '');
  charCount.className = 'char-count' + (len > 2200 ? ' over' : '');
}

function copyCaption() {
  const text = document.getElementById('preview').textContent;
  if (text === 'Your caption will appear here...') return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied to clipboard!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy caption'; btn.classList.remove('copied'); }, 2200);
  });
}

renderFontButtons('highlight-fonts', highlightFont, id => { highlightFont = id; });
renderFontButtons('body-fonts', bodyFont, id => { bodyFont = id; });
renderSignoffs();
renderDishes();
render();
</script>
</body>
